<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Map — Quest Log</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0c0c12;
            --panel-bg: #181825;
            --border-color: #705335;
            --text-color: #f4ebd0;
            --text-dim: #a59a84;
            --accent-color: #ff9f1c;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'VT323', monospace;
            font-size: 1.3rem;
            letter-spacing: 1px;
            padding: 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 4px double var(--border-color);
            padding-bottom: 10px;
        }

        h1 {
            font-family: 'Press Start 2P', cursive;
            font-size: 1.5rem;
            color: var(--accent-color);
            text-shadow: 3px 3px 0px #000;
        }

        #connection-status {
            font-size: 0.9rem;
            font-family: 'Press Start 2P', cursive;
            margin-top: 5px;
        }

        .status-ok    { color: #55ff55; }
        .status-error { color: #ff5555; }

        .dashboard-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            flex: 1;
            min-height: 0;
        }

        .rpg-panel {
            background-color: var(--panel-bg);
            border: 4px solid var(--border-color);
            outline: 2px solid #000;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
            padding: 15px;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .panel-title {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.9rem;
            color: var(--accent-color);
            border-bottom: 2px dashed var(--border-color);
            padding-bottom: 8px;
            margin-bottom: 15px;
        }

        /* Task list */
        .task-list-wrapper { overflow-y: auto; flex: 1; }

        .task-item {
            border: 2px solid #2a2a3a;
            padding: 8px 10px;
            margin-bottom: 8px;
            background: rgba(0,0,0,0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }

        .task-item.mandatory {
            border-color: var(--accent-color);
            box-shadow: 0 0 6px rgba(255,159,28,0.3);
            background: rgba(255,159,28,0.04);
        }

        .task-title { flex: 1; }

        .type-badge {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.55rem;
            padding: 3px 6px;
            border: 1px solid currentColor;
            white-space: nowrap;
        }

        .type-mandatory { color: var(--accent-color); }
        .type-bonus      { color: #7ec8e3; }
        .type-habit      { color: #a8e6a3; }
        .type-project    { color: #c8a8e6; }

        .no-tasks {
            color: var(--text-dim);
            font-style: italic;
            padding: 10px 0;
        }

        /* Chat */
        .chat-log {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 15px;
            padding-right: 5px;
        }

        .chat-msg { margin-bottom: 12px; line-height: 1.4; }

        .msg-user   { color: #55ffff; }
        .msg-ai     { color: var(--text-color); }
        .msg-system { color: var(--text-dim); font-style: italic; }

        .chat-input-row { display: flex; gap: 10px; }

        input[type="text"] {
            flex: 1;
            background-color: #000;
            border: 2px solid var(--border-color);
            color: var(--text-color);
            font-family: 'VT323', monospace;
            font-size: 1.4rem;
            padding: 8px;
            outline: none;
        }

        input[type="text"]:focus { border-color: var(--accent-color); }

        button {
            background-color: var(--border-color);
            color: #fff;
            border: 2px solid #000;
            font-family: 'VT323', monospace;
            font-size: 1.4rem;
            padding: 8px 16px;
            cursor: pointer;
        }

        button:hover { background-color: var(--accent-color); color: #000; }

        @media (max-width: 768px) {
            .dashboard-container { grid-template-columns: 1fr; }
            body { height: auto; }
        }
    </style>
</head>
<body>

    <header>
        <h1>LIFE MAP</h1>
        <div id="connection-status">LINKING TO REALM...</div>
    </header>

    <div class="dashboard-container">
        
        <div class="rpg-panel">
            <div class="panel-title">> TODAY'S QUESTS</div>
            <div class="task-list-wrapper" id="task-list">
                <div class="no-tasks">Loading...</div>
            </div>
        </div>

        <div class="rpg-panel">
            <div class="panel-title">> TALK TO SECRETARY</div>
            <div class="chat-log" id="chat-log">
                <div class="chat-msg msg-system">System initialization complete. Speak your intent.</div>
            </div>
            <div class="chat-input-row">
                <input type="text" id="chat-input" placeholder="Type a command..." autocomplete="off">
                <button id="send-btn">EXECUTE</button>
            </div>
        </div>

    </div>

    <script>
    const API_BASE = "https://lifemapv1-production.up.railway.app";

    const statusEl  = document.getElementById('connection-status');
    const chatLog   = document.getElementById('chat-log');
    const chatInput = document.getElementById('chat-input');
    const sendBtn   = document.getElementById('send-btn');
    const taskListEl = document.getElementById('task-list');

    let sessionId = localStorage.getItem('lifemap_session_id') || null;

    // ── Health check ──────────────────────────────────────────
    async function checkHealth() {
        try {
            const res = await fetch(`${API_BASE}/health`);
            if (!res.ok) throw new Error();
            statusEl.innerText = "● REALM CONNECTED";
            statusEl.className = "status-ok";
        } catch {
            statusEl.innerText = "● LINK BROKEN";
            statusEl.className = "status-error";
        }
    }

    // ── Dashboard refresh via GET /state (never touches /chat) ─
    async function refreshDashboard() {
        try {
            const res  = await fetch(`${API_BASE}/state`);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            renderTaskList(data.tasks ?? []);
        } catch (err) {
            taskListEl.innerHTML = `<div class="no-tasks" style="color:#ff5555;">Failed to load quests.</div>`;
        }
    }

    function renderTaskList(tasks) {
        if (tasks.length === 0) {
            taskListEl.innerHTML = `<div class="no-tasks">No active quests. Add one.</div>`;
            return;
        }

        const html = tasks.map((t) => {
            const isMandatory = t.type === 'Mandatory';
            const typeClass   = `type-${(t.type || 'bonus').toLowerCase()}`;
            return `
                <div class="task-item ${isMandatory ? 'mandatory' : ''}">
                    <span class="task-title">${escapeHtml(t.title)}</span>
                    <span class="type-badge ${typeClass}">${t.type || 'Bonus'}</span>
                </div>`;
        }).join('');

        taskListEl.innerHTML = html;
    }

    function escapeHtml(str) {
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    // ── Chat ──────────────────────────────────────────────────
    async function handleSendMessage() {
        const text = chatInput.value.trim();
        if (!text) return;

        appendChatMessage("YOU", text, "msg-user");
        chatInput.value = '';
        sendBtn.disabled = true;

        try {
            const response = await fetch(`${API_BASE}/chat`, {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ message: text, session_id: sessionId || undefined }),
            });

            const data = await response.json();

            if (data.session_id) {
                sessionId = data.session_id;
                localStorage.setItem('lifemap_session_id', sessionId);
            }

            appendChatMessage("SECRETARY", data.reply || "Understood.", "msg-ai");

            // Refresh task panel after every action — uses /state, not /chat
            await refreshDashboard();

        } catch {
            appendChatMessage("SYS", "Connection lost to the realm.", "msg-system");
        } finally {
            sendBtn.disabled = false;
            chatInput.focus();
        }
    }

    function appendChatMessage(sender, message, styleClass) {
        const msgNode = document.createElement('div');
        msgNode.className = `chat-msg ${styleClass}`;
        msgNode.innerHTML = `<strong>[${sender}]:</strong> ${escapeHtml(message)}`;
        chatLog.appendChild(msgNode);
        chatLog.scrollTop = chatLog.scrollHeight;
    }

    // ── Init ──────────────────────────────────────────────────
    sendBtn.addEventListener('click', handleSendMessage);
    chatInput.addEventListener('keydown', e => { if (e.key === 'Enter') handleSendMessage(); });

    checkHealth();
    refreshDashboard();
    </script>
</body>
</html>
