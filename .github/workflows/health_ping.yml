# health_ping.yml
# ─────────────────────────────────────────────────────────────
# Trigger:   Every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)
# Purpose:   Keep Supabase free tier alive. Verify Railway API is up.
# Reads:     Nothing — pure liveness check
# Writes:    Nothing — no DB writes
# Logs:      HTTP status code + response body to Actions run log
# ─────────────────────────────────────────────────────────────

name: Health Ping

on:
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch:          # Allow manual trigger for testing

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping health endpoint
        env:
          RAILWAY_URL: ${{ secrets.RAILWAY_URL }}
        run: |
          echo "Pinging: ${RAILWAY_URL}/health"
          # TODO: confirm /health is the correct path once Chat API Agent delivers the endpoint
          RESPONSE=$(curl --fail --silent --show-error \
            --max-time 15 \
            --write-out "\nHTTP_STATUS:%{http_code}" \
            "${RAILWAY_URL}/health")

          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | grep -v "HTTP_STATUS:")

          echo "HTTP Status: ${HTTP_STATUS}"
          echo "Response body: ${BODY}"

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ Health check failed with status ${HTTP_STATUS}"
            exit 1
          fi

          echo "✅ Health check passed"
